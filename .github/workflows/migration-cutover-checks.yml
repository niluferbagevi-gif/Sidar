name: Migration Cutover Checks

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  migration-and-pool-checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sidar
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sidar"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sidar

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --frozen --all-extras

      - name: Alembic upgrade/downgrade/upgrade chain (PostgreSQL)
        run: |
          alembic -x database_url="$DATABASE_URL" upgrade head
          alembic -x database_url="$DATABASE_URL" downgrade base
          alembic -x database_url="$DATABASE_URL" upgrade head

      - name: Create SQLite fixture for dry-run migration rehearsal
        run: |
          python - <<'PY'
          import sqlite3
          from pathlib import Path
          p = Path('temp/migration_dry_run.db')
          p.parent.mkdir(parents=True, exist_ok=True)
          conn = sqlite3.connect(str(p))
          try:
              conn.executescript('''
              CREATE TABLE users (id TEXT PRIMARY KEY, username TEXT, password_hash TEXT, role TEXT, created_at TEXT);
              CREATE TABLE auth_tokens (token TEXT PRIMARY KEY, user_id TEXT, expires_at TEXT, created_at TEXT);
              CREATE TABLE user_quotas (user_id TEXT PRIMARY KEY, daily_token_limit INTEGER, daily_request_limit INTEGER);
              CREATE TABLE provider_usage_daily (id INTEGER PRIMARY KEY AUTOINCREMENT, user_id TEXT, provider TEXT, usage_date TEXT, requests_used INTEGER, tokens_used INTEGER);
              CREATE TABLE sessions (id TEXT PRIMARY KEY, user_id TEXT, title TEXT, created_at TEXT, updated_at TEXT);
              CREATE TABLE messages (id INTEGER PRIMARY KEY AUTOINCREMENT, session_id TEXT, role TEXT, content TEXT, tokens_used INTEGER, created_at TEXT);
              CREATE TABLE schema_versions (version INTEGER PRIMARY KEY, applied_at TEXT, description TEXT);
              ''')
              conn.execute("INSERT INTO users VALUES (?, ?, ?, ?, ?)", ('11111111-1111-1111-1111-111111111111', 'staging_admin', 'hash', 'admin', '2026-03-11T00:00:00+00:00'))
              conn.execute("INSERT INTO sessions VALUES (?, ?, ?, ?, ?)", ('22222222-2222-2222-2222-222222222222', '11111111-1111-1111-1111-111111111111', 'staging smoke', '2026-03-11T00:00:00+00:00', '2026-03-11T00:00:00+00:00'))
              conn.execute("INSERT INTO messages (session_id, role, content, tokens_used, created_at) VALUES (?, ?, ?, ?, ?)", ('22222222-2222-2222-2222-222222222222', 'user', 'hello', 3, '2026-03-11T00:00:00+00:00'))
              conn.commit()
          finally:
              conn.close()
          print(p)
          PY

      - name: Run SQLite -> PostgreSQL dry-run rehearsal
        run: |
          python scripts/migrate_sqlite_to_pg.py \
            --sqlite-path temp/migration_dry_run.db \
            --postgres-dsn "$DATABASE_URL" \
            --dry-run

      - name: Run PostgreSQL pool load smoke (50 concurrent)
        run: |
          python scripts/load_test_db_pool.py \
            --database-url "$DATABASE_URL" \
            --concurrency 50 \
            --requests 300

      - name: Verify Swarm + Active Learning production cutover slice
        run: |
          pytest -q tests/test_swarm_orchestrator.py tests/test_active_learning.py tests/test_migration_ci_guards.py
