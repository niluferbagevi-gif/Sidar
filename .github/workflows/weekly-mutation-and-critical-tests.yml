name: Weekly Mutation & Critical Assertion Gates

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

concurrency:
  group: weekly-mutation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-mutation:
    name: Backend Mutation Testing (mutmut)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Run mutmut campaign
        run: uv run --with mutmut mutmut run --max-children 2

      - name: Print mutation summary
        if: always()
        run: uv run --with mutmut mutmut results

      - name: Export mutation CI stats
        if: always()
        run: uv run --with mutmut mutmut export-cicd-stats > mutmut-stats.json

      - name: Upload mutation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutmut-weekly-report
          path: |
            .mutmut-cache
            mutmut-stats.json
          if-no-files-found: warn
          retention-days: 14

  frontend-critical-assertions:
    name: Frontend Critical Assertion Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web_ui_react/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd web_ui_react
          npm ci

      - name: Run critical edge/error assertion tests
        run: |
          cd web_ui_react
          npm run test:critical
