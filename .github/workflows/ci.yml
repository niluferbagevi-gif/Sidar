name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Collect repository metrics
        run: bash scripts/collect_repo_metrics.sh

      - name: Audit source line metrics (standardized)
        run: |
          bash scripts/audit_metrics.sh . markdown
          bash scripts/audit_metrics.sh . json

      - name: Check empty test artifacts
        run: |
          empty_files=$(find tests -type f -size 0 -print)
          if [ -n "$empty_files" ]; then
            echo "❌ Empty test artifact(s) found:"
            echo "$empty_files"
            exit 1
          fi
          echo "✅ No empty test artifacts found"

      - name: Run test suite
        run: bash run_tests.sh

      - name: Enforce coverage quality gate (95%)
        run: |
          python -m pytest -q --cov=. --cov-report=term-missing --cov-fail-under=95