name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build CI image (Dockerfile)
        run: |
          docker build --build-arg INSTALL_DEV=true -t sidar-ci:${{ github.sha }} .

      - name: Run backend quality gates + tests in container
        run: |
          mkdir -p .ci-artifacts
          docker run --rm \
            -v "${{ github.workspace }}/.ci-artifacts:/ci-artifacts" \
            --entrypoint bash \
            sidar-ci:${{ github.sha }} \
            -lc '
              uv run ruff check . &&
              uv run ruff format --check . &&
              uv run bandit -q -r . -x tests,web_ui_react,node_modules,.venv &&
              uv run safety check --full-report &&
              bash scripts/collect_repo_metrics.sh &&
              bash scripts/audit_metrics.sh . markdown &&
              bash scripts/audit_metrics.sh . json &&
              bash scripts/check_empty_test_artifacts.sh &&
              uv run pytest -q -m quality_gate tests/quality/test_llm_quality_gate.py &&
              uv run bash run_tests.sh &&
              bash scripts/check_env_parity.sh &&
              cp -r htmlcov /ci-artifacts/htmlcov 2>/dev/null || true &&
              cp -r web_ui_react/coverage /ci-artifacts/frontend-coverage 2>/dev/null || true
            '

      - name: Set up Node.js (with npm cache)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web_ui_react/package-lock.json

      - name: Run frontend lint gate (eslint)
        run: |
          cd web_ui_react
          npm ci
          npm run lint

      - name: Upload Backend Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: .ci-artifacts/htmlcov/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Frontend Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: .ci-artifacts/frontend-coverage/
          if-no-files-found: ignore
          retention-days: 14

  pg-stress:
    name: PostgreSQL Connection Pool Stress Test
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sidar
          POSTGRES_PASSWORD: sidar_test
          POSTGRES_DB: sidar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sidar"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://sidar:sidar_test@localhost:5432/sidar_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build CI image (Dockerfile)
        run: |
          docker build --build-arg INSTALL_DEV=true -t sidar-ci:${{ github.sha }} .

      - name: Run DB migration + PostgreSQL stress tests in container
        run: |
          docker run --rm \
            --network host \
            -e DATABASE_URL="${{ env.DATABASE_URL }}" \
            --entrypoint bash \
            sidar-ci:${{ github.sha }} \
            -lc '
              uv run alembic upgrade head &&
              uv run pytest -v -m pg_stress tests/integration/db/ --timeout=120 -x
            '
