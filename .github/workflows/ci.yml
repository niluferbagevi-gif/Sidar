name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Cache APT packages (PortAudio)
        uses: awalsh128/cache-apt-pkgs-action@v1.4.3
        with:
          packages: portaudio19-dev
          version: ci-portaudio-v1

      - name: Install system dependencies (PortAudio via project script)
        run: bash scripts/install_ci_system_deps.sh

      - name: Install dependencies
        run: |
          uv sync --frozen --all-extras

      - name: Set up Node.js (with npm cache)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web_ui_react/package-lock.json

      - name: Run Python lint gate (ruff)
        run: uv run ruff check .

      - name: Run Python format check gate (ruff format)
        run: uv run ruff format --check .

      - name: Run frontend lint gate (eslint)
        run: |
          cd web_ui_react
          npm ci
          npm run lint

      - name: Run SAST gates (Bandit + Safety)
        run: |
          uv run bandit -q -r . -x tests,web_ui_react,node_modules,.venv
          uv run safety check --full-report

      - name: Collect repository metrics
        run: bash scripts/collect_repo_metrics.sh

      - name: Audit source line metrics (standardized)
        run: |
          bash scripts/audit_metrics.sh . markdown
          bash scripts/audit_metrics.sh . json

      - name: Check empty test artifacts
        run: bash scripts/check_empty_test_artifacts.sh

      - name: Run deterministic LLM quality gate
        run: uv run pytest -q -m quality_gate tests/quality/test_llm_quality_gate.py

      - name: Run test suite (single pass + coverage gate)
        run: uv run bash run_tests.sh

      - name: Upload Backend Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: htmlcov/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Frontend Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: web_ui_react/coverage/
          if-no-files-found: ignore
          retention-days: 14

      - name: Check .env.example ↔ config.py parity
        run: bash scripts/check_env_parity.sh

  pg-stress:
    name: PostgreSQL Connection Pool Stress Test
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sidar
          POSTGRES_PASSWORD: sidar_test
          POSTGRES_DB: sidar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sidar"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://sidar:sidar_test@localhost:5432/sidar_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Cache APT packages (PortAudio)
        uses: awalsh128/cache-apt-pkgs-action@v1.4.3
        with:
          packages: portaudio19-dev
          version: ci-portaudio-v1

      - name: Install system dependencies (PortAudio via project script)
        run: bash scripts/install_ci_system_deps.sh

      - name: Install dependencies
        run: |
          uv sync --frozen --all-extras

      - name: Run DB schema migration
        run: uv run alembic upgrade head

      - name: Run PostgreSQL connection pool stress tests
        run: |
          uv run pytest -v -m pg_stress tests/integration/db/ \
            --timeout=120 \
            -x

  gpu-inference-quality-gate:
    name: GPU Inference Quality Gate (TTFT<=200ms, latency<=250ms)
    if: ${{ vars.ENABLE_GPU_BENCH_GATE == 'true' }}
    runs-on: [self-hosted, linux, gpu]
    needs: test

    env:
      GPU_BENCH_TTFT_BUDGET: "0.2"
      GPU_BENCH_LATENCY_BUDGET: "0.25"
      RUN_GPU_STRESS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Run GPU inference benchmark quality gate
        run: bash scripts/ci/run_ttft_quality_gate.sh

      - name: Upload GPU inference gate JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-inference-quality-gate-junit
          path: gpu-inference-quality-gate.junit.xml
          if-no-files-found: warn
          retention-days: 14
