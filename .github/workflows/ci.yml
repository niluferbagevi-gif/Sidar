name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Collect repository metrics
        run: bash scripts/collect_repo_metrics.sh

      - name: Audit source line metrics (standardized)
        run: |
          bash scripts/audit_metrics.sh . markdown
          bash scripts/audit_metrics.sh . json

      - name: Check empty test artifacts
        run: |
          empty_files=$(find tests -type f -size 0 -print)
          if [ -n "$empty_files" ]; then
            echo "❌ Empty test artifact(s) found:"
            echo "$empty_files"
            exit 1
          fi
          echo "✅ No empty test artifacts found"

      - name: Run test suite
        run: bash run_tests.sh

      - name: Check .env.example ↔ config.py parity
        run: bash scripts/check_env_parity.sh

      - name: Run sandbox/reviewer hardening checks
        run: |
          pytest -q tests/test_sandbox_runtime_profiles.py tests/test_reviewer_agent.py

      - name: Enforce coverage quality gate (100%)
        run: |
          python -m pytest -q --cov=. --cov-report=term-missing --cov-fail-under=100

  pg-stress:
    name: PostgreSQL Connection Pool Stress Test
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sidar
          POSTGRES_PASSWORD: sidar_test
          POSTGRES_DB: sidar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sidar"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://sidar:sidar_test@localhost:5432/sidar_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt asyncpg

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -U sidar; do sleep 1; done

      - name: Run DB schema migration
        run: alembic upgrade head

      - name: Run PostgreSQL connection pool stress tests
        run: |
          pytest -v -m pg_stress tests/test_db_postgresql_branches.py \
            --timeout=120 \
            -x
