nameOverride: ""
fullnameOverride: ""

image:
  repository: sidar/app
  tag: latest
  pullPolicy: IfNotPresent

web:
  enabled: true
  replicaCount: 2
  command: ["python", "web_server.py", "--host", "0.0.0.0", "--port", "7860"]
  service:
    type: ClusterIP
    port: 7860
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

aIWorker:
  enabled: true
  replicaCount: 1
  command: ["python", "sidar.py"]
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

redis:
  enabled: true
  image: redis:alpine
  port: 6379
  maxConnections: 100
  storage:
    size: 5Gi
    storageClassName: ""

postgresql:
  enabled: true
  image: pgvector/pgvector:pg16
  port: 5432
  database: sidar
  username: sidar
  password: sidar
  storage:
    size: 10Gi
    storageClassName: ""

database:
  poolSize: 10

hpa:
  web:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

env:
  AI_PROVIDER: ollama
  OLLAMA_URL: http://host.docker.internal:11434/api
  WEB_HOST: 0.0.0.0
  WEB_PORT: "7860"
  ENABLE_TRACING: "true"
  OTEL_EXPORTER_ENDPOINT: http://sidar-otel-collector:4317

apm:
  enabled: true
  backend: jaeger # jaeger | zipkin
  collector:
    image: otel/opentelemetry-collector-contrib:0.102.1
    replicaCount: 1
    service:
      grpcPort: 4317
      httpPort: 4318
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  jaeger:
    enabled: true
    image: jaegertracing/all-in-one:1.59
    service:
      collectorGrpcPort: 4317
      collectorHttpPort: 14268
      queryPort: 16686
    ingress:
      enabled: true
      className: nginx
      host: jaeger.sidar.local
      tlsSecretName: jaeger-tls
      auth:
        enabled: true
        mode: basic-auth # basic-auth | oauth2-proxy
        basicAuthSecretName: sidar-jaeger-basic-auth
        oauth2Proxy:
          enabled: false
          authUrl: "https://oauth2-proxy.sidar.local/oauth2/auth"
          signInUrl: "https://oauth2-proxy.sidar.local/oauth2/start?rd=$request_uri"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  zipkin:
    enabled: true
    image: openzipkin/zipkin:3
    service:
      port: 9411
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 512Mi

monitoring:
  sloDashboard:
    enabled: true
  grafana:
    ingress:
      enabled: true
      className: nginx
      host: grafana.sidar.local
      tlsSecretName: grafana-tls
      auth:
        enabled: true
        mode: basic-auth # basic-auth | oauth2-proxy
        basicAuthSecretName: sidar-grafana-basic-auth
        oauth2Proxy:
          enabled: false
          authUrl: "https://oauth2-proxy.sidar.local/oauth2/auth"
          signInUrl: "https://oauth2-proxy.sidar.local/oauth2/start?rd=$request_uri"
  prometheus:
    ingress:
      enabled: true
      className: nginx
      host: prometheus.sidar.local
      tlsSecretName: prometheus-tls
      auth:
        enabled: true
        mode: basic-auth # basic-auth | oauth2-proxy
        basicAuthSecretName: sidar-prometheus-basic-auth
        oauth2Proxy:
          enabled: false
          authUrl: "https://oauth2-proxy.sidar.local/oauth2/auth"
          signInUrl: "https://oauth2-proxy.sidar.local/oauth2/start?rd=$request_uri"

healthChecks:
  dependencyChecksEnabled: true
  connectTimeoutMs: 250

eventBus:
  dlqChannel: sidar:agent_events:dlq
  dlqMaxLen: 1000

# --- Üretim Dayanıklılık Ayarları ---
podDisruptionBudget:
  web:
    enabled: true
    minAvailable: 1
  aiWorker:
    enabled: false

networkPolicy:
  enabled: true
  # İzin verilen ingress kaynakları (boş = tüm namespace'ler)
  ingressNamespaceSelector: {}
  # Sidar web pod'larına yalnızca bu portlardan erişim izni verilir
  allowedIngressPorts:
    - 7860  # FastAPI web
    - 8080  # (opsiyonel reverse-proxy)
  # Egress: Sidar'ın dışarıya açabileceği hedefler
  allowAllEgress: true
