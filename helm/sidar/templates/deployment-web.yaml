{{- if .Values.web.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sidar.fullname" . }}-web
  labels:
    app.kubernetes.io/name: {{ include "sidar.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: web
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: web
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: sidar-web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: {{ toJson .Values.web.command }}
          ports:
            - name: http
              containerPort: {{ .Values.web.service.port }}
          env:
            - name: REDIS_URL
              value: "redis://{{ include \"sidar.fullname\" . }}-redis:{{ .Values.redis.port }}/0"
            - name: DATABASE_URL
              value: "postgresql+asyncpg://{{ .Values.postgresql.username }}:{{ .Values.postgresql.password }}@{{ include \"sidar.fullname\" . }}-postgresql:{{ .Values.postgresql.port }}/{{ .Values.postgresql.database }}"
            - name: OTEL_EXPORTER_ENDPOINT
              value: {{ include "sidar.otelEndpoint" . | quote }}
            - name: ENABLE_DEPENDENCY_HEALTHCHECKS
              value: {{ ternary "true" "false" .Values.healthChecks.dependencyChecksEnabled | quote }}
            - name: HEALTHCHECK_CONNECT_TIMEOUT_MS
              value: {{ .Values.healthChecks.connectTimeoutMs | quote }}
            - name: SIDAR_EVENT_BUS_DLQ_CHANNEL
              value: {{ .Values.eventBus.dlqChannel | quote }}
            - name: SIDAR_EVENT_BUS_DLQ_MAXLEN
              value: {{ .Values.eventBus.dlqMaxLen | quote }}
            {{- range $k, $v := .Values.env }}
            {{- if ne $k "OTEL_EXPORTER_ENDPOINT" }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
      securityContext:
        fsGroup: 1000
{{- end }}
