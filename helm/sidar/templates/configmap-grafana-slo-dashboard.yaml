{{- if .Values.monitoring.sloDashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sidar.fullname" . }}-slo-dashboard
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: {{ include "sidar.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: monitoring
data:
  sidar-slo-overview.json: |
    {
      "title": "Sidar SLO Overview",
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "panels": [
        {
          "type": "stat",
          "title": "Availability (up)",
          "gridPos": {"h": 6, "w": 8, "x": 0, "y": 0},
          "targets": [{"expr": "avg(up{job=~\"sidar.*\"}) * 100", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "percent", "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 99}, {"color": "green", "value": 99.9}]}}}
        },
        {
          "type": "timeseries",
          "title": "Request Throughput (rps)",
          "gridPos": {"h": 8, "w": 16, "x": 8, "y": 0},
          "targets": [{"expr": "sum(rate(http_server_requests_seconds_count[5m]))", "refId": "A"}]
        },
        {
          "type": "timeseries",
          "title": "P95 Latency (s)",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 6},
          "targets": [{"expr": "histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (le))", "refId": "A"}]
        },
        {
          "type": "timeseries",
          "title": "5xx Error Rate",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 6},
          "targets": [{"expr": "sum(rate(http_server_requests_seconds_count{status=~\"5..\"}[5m])) / clamp_min(sum(rate(http_server_requests_seconds_count[5m])), 1)", "refId": "A"}]
        }
      ]
    }
{{- end }}