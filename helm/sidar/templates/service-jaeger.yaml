{{- if and .Values.apm.enabled (eq .Values.apm.backend "jaeger") .Values.apm.jaeger.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sidar.fullname" . }}-jaeger
  labels:
    app.kubernetes.io/name: {{ include "sidar.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: jaeger
spec:
  type: ClusterIP
  ports:
    - name: collector-grpc
      port: {{ .Values.apm.jaeger.service.collectorGrpcPort }}
      targetPort: collector-grpc
    - name: collector-http
      port: {{ .Values.apm.jaeger.service.collectorHttpPort }}
      targetPort: collector-http
    - name: query
      port: {{ .Values.apm.jaeger.service.queryPort }}
      targetPort: query
  selector:
    app.kubernetes.io/component: jaeger
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}