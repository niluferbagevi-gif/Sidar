[pytest]
testpaths = tests
python_files = test_*.py
asyncio_mode = auto
# pytest-asyncio >= 0.21: session kapsamlı event loop (DB testleri için gerekli)
asyncio_default_fixture_loop_scope = session
markers =
    asyncio: run coroutine test
    slow: yavaş entegrasyon testleri (CI'da -m "not slow" ile atlanabilir)
    pg_stress: PostgreSQL bağlantı havuzu yük testleri (postgres servisi gerektirir)