[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    smoke: hızlı sağlık kontrol testleri (CI başlangıcı)
    benchmark: performans baseline testleri
    integration: harici sistem entegrasyonları
    quality_gate: LLM kalite kapısı doğrulamaları
