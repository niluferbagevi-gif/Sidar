services:
  # Not: Development'ta varsayılan bind-mount kullanılır.
  # Production'ta host permission/chown sorunlarını azaltmak için aşağıdaki
  # env değişkenlerini named volume ile override edin:
  #   SIDAR_DATA_MOUNT=sidar_data_prod
  #   SIDAR_LOGS_MOUNT=sidar_logs_prod
  #   SIDAR_TEMP_MOUNT=sidar_temp_prod

  redis:
    image: redis:alpine
    container_name: sidar_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: pgvector/pgvector:pg16
    container_name: sidar_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-sidar}
      - POSTGRES_USER=${POSTGRES_USER:-sidar}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sidar}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER:-sidar} -d ${POSTGRES_DB:-sidar} || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s

  ollama:
    image: ollama/ollama:latest
    container_name: sidar_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # ── CLI Modu — CPU (Varsayılan) ────────────────────────────────
  sidar-ai:
    profiles: ["cpu"]
    build:
      context: .
      args:
        BASE_IMAGE: python:3.11-slim
        GPU_ENABLED: "false"
    container_name: sidar_agent
    restart: unless-stopped
    cpus: ${SIDAR_CPU_LIMIT:-2.0}
    mem_limit: ${SIDAR_MEM_LIMIT:-4g}

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

    environment:
      - ACCESS_LEVEL=sandbox
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434/api}
      - DB_POOL_SIZE=${DB_POOL_SIZE:-10}
      - REDIS_MAX_CONNECTIONS=${REDIS_MAX_CONNECTIONS:-100}

    env_file:
      - .env

    volumes:
      - ${SIDAR_DATA_MOUNT:-./data}:/app/data
      - ${SIDAR_LOGS_MOUNT:-./logs}:/app/logs
      - ${SIDAR_TEMP_MOUNT:-./temp}:/app/temp
      - /var/run/docker.sock:/var/run/docker.sock

    extra_hosts:
      - "host.docker.internal:${HOST_GATEWAY:-host-gateway}"

    stdin_open: true
    tty: true

  # ── CLI Modu — GPU (NVIDIA) ────────────────────────────────────
  # Kullanım: docker compose up sidar-gpu
  # Gereksinim: NVIDIA Container Toolkit kurulu olmalı.
  #   https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
  # WSL2 notu: WSL2 üzerinde Docker GPU desteği için önce Windows tarafında
  #   NVIDIA Driver (>=595.x) kurulmalı; WSL2 içinde ayrıca nvidia-ctk kurulumu gerekir:
  #   sudo apt-get install -y nvidia-container-toolkit && sudo nvidia-ctk runtime configure --runtime=docker
  sidar-gpu:
    profiles: ["gpu"]
    build:
      context: .
      args:
        BASE_IMAGE: nvidia/cuda:13.0.0-runtime-ubuntu22.04
        GPU_ENABLED: "true"
        TORCH_INDEX_URL: https://download.pytorch.org/whl/cu130
    container_name: sidar_agent_gpu
    restart: unless-stopped
    cpus: ${SIDAR_GPU_CPU_LIMIT:-4.0}
    mem_limit: ${SIDAR_GPU_MEM_LIMIT:-8g}

    # NVIDIA GPU çalışma zamanı (Docker Compose v2 sözdizimi)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all          # Tüm GPU'ları bağla; belirli sayı için: count: 1
              capabilities: [gpu]
        limits:
          cpus: '4.0'
          memory: 8G

    depends_on:
      - redis
      - ollama

    environment:
      - ACCESS_LEVEL=sandbox
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434/api}
      - DB_POOL_SIZE=${DB_POOL_SIZE:-10}
      - REDIS_MAX_CONNECTIONS=${REDIS_MAX_CONNECTIONS:-100}
      - USE_GPU=true
      - GPU_DEVICE=${GPU_DEVICE:-0}
      - GPU_MEMORY_FRACTION=${GPU_MEMORY_FRACTION:-0.8}
      - GPU_MIXED_PRECISION=${GPU_MIXED_PRECISION:-true}   # Ampere+ (RTX 30xx/40xx) FP16 destekler; eski GPU için .env'de false yapın
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

    env_file:
      - .env

    volumes:
      - ${SIDAR_DATA_MOUNT:-./data}:/app/data
      - ${SIDAR_LOGS_MOUNT:-./logs}:/app/logs
      - ${SIDAR_TEMP_MOUNT:-./temp}:/app/temp
      - /var/run/docker.sock:/var/run/docker.sock

    extra_hosts:
      - "host.docker.internal:${HOST_GATEWAY:-host-gateway}"

    stdin_open: true
    tty: true

  # ── Web Arayüzü — CPU ──────────────────────────────────────────
  sidar-web:
    profiles: ["cpu"]
    build:
      context: .
      args:
        BASE_IMAGE: python:3.11-slim
        GPU_ENABLED: "false"
    container_name: sidar_web
    restart: unless-stopped
    cpus: ${SIDAR_WEB_CPU_LIMIT:-2.0}
    mem_limit: ${SIDAR_WEB_MEM_LIMIT:-4g}
    command: --quick web --host 0.0.0.0 --port 7860

    ports:
      - "${WEB_PORT:-7860}:7860"

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

    depends_on:
      - redis
      - postgres
      - jaeger
      - ollama

    environment:
      - ACCESS_LEVEL=sandbox
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434/api}
      - DB_POOL_SIZE=${DB_POOL_SIZE:-10}
      - REDIS_MAX_CONNECTIONS=${REDIS_MAX_CONNECTIONS:-100}
      - WEB_HOST=0.0.0.0
      - WEB_PORT=7860
      - MEMORY_ENCRYPTION_KEY=${MEMORY_ENCRYPTION_KEY:-}
      - API_KEY=${API_KEY:-}
      - ENABLE_TRACING=${ENABLE_TRACING:-true}
      - OTEL_EXPORTER_ENDPOINT=${OTEL_EXPORTER_ENDPOINT:-http://jaeger:4317}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-sidar-web}
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://sidar:sidar@postgres:5432/sidar}

    env_file:
      - .env

    volumes:
      - ${SIDAR_DATA_MOUNT:-./data}:/app/data
      - ${SIDAR_LOGS_MOUNT:-./logs}:/app/logs
      - ${SIDAR_TEMP_MOUNT:-./temp}:/app/temp

    extra_hosts:
      - "host.docker.internal:${HOST_GATEWAY:-host-gateway}"

  # ── Web Arayüzü — GPU ─────────────────────────────────────────
  # Kullanım: docker compose up sidar-web-gpu
  sidar-web-gpu:
    profiles: ["gpu"]
    build:
      context: .
      args:
        BASE_IMAGE: nvidia/cuda:13.0.0-runtime-ubuntu22.04
        GPU_ENABLED: "true"
        TORCH_INDEX_URL: https://download.pytorch.org/whl/cu130
    container_name: sidar_web_gpu
    restart: unless-stopped
    cpus: ${SIDAR_WEB_GPU_CPU_LIMIT:-4.0}
    mem_limit: ${SIDAR_WEB_GPU_MEM_LIMIT:-8g}
    command: --quick web --host 0.0.0.0 --port 7860

    ports:
      - "${WEB_GPU_PORT:-7861}:7860"

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          cpus: '4.0'
          memory: 8G

    depends_on:
      - redis
      - postgres
      - jaeger
      - ollama

    environment:
      - ACCESS_LEVEL=sandbox
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434/api}
      - DB_POOL_SIZE=${DB_POOL_SIZE:-10}
      - REDIS_MAX_CONNECTIONS=${REDIS_MAX_CONNECTIONS:-100}
      - WEB_HOST=0.0.0.0
      - WEB_PORT=7860
      - USE_GPU=true
      - GPU_DEVICE=${GPU_DEVICE:-0}
      - GPU_MEMORY_FRACTION=${GPU_MEMORY_FRACTION:-0.8}
      - GPU_MIXED_PRECISION=${GPU_MIXED_PRECISION:-true}   # Ampere+ (RTX 30xx/40xx) FP16 destekler; eski GPU için .env'de false yapın
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - MEMORY_ENCRYPTION_KEY=${MEMORY_ENCRYPTION_KEY:-}
      - API_KEY=${API_KEY:-}
      - ENABLE_TRACING=${ENABLE_TRACING:-true}
      - OTEL_EXPORTER_ENDPOINT=${OTEL_EXPORTER_ENDPOINT:-http://jaeger:4317}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-sidar-web-gpu}
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://sidar:sidar@postgres:5432/sidar}

    env_file:
      - .env

    volumes:
      - ${SIDAR_DATA_MOUNT:-./data}:/app/data
      - ${SIDAR_LOGS_MOUNT:-./logs}:/app/logs
      - ${SIDAR_TEMP_MOUNT:-./temp}:/app/temp

    extra_hosts:
      - "host.docker.internal:${HOST_GATEWAY:-host-gateway}"


  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: sidar_jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "4317:4317"

  prometheus:
    image: prom/prometheus:latest
    container_name: sidar_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker_setup/prometheus:/etc/prometheus:ro

  grafana:
    image: grafana/grafana:latest
    container_name: sidar_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./docker_setup/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker_setup/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  redis_data:
  postgres_data:
  ollama_data:
  sidar_data_prod:
  sidar_logs_prod:
  sidar_temp_prod:
