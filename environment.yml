name: sidar

# ── Kanal öncelik sırası ──────────────────────────────────────────────────────
# pytorch  : PyTorch GPU wheellerini conda üzerinden sunar
# nvidia   : CUDA araçları (cudatoolkit, cudnn)
# conda-forge: güncel topluluk paketleri
# defaults  : Anaconda/Miniconda standart kanalı
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # ── Python çekirdeği ──────────────────────────────────────────────────────
  - python=3.11
  - pip>=24.0

  # ── Ses/PortAudio (pyaudio için sistem bağımlılığı) ───────────────────────
  # WSL2 üzerinde pyaudio ses desteği için portaudio conda'dan kurulur;
  # pip wheelinin derlenmesi gerekmez.
  - portaudio

  # ── uv paket yöneticisi (conda-forge) ────────────────────────────────────
  # conda-forge kanalından conda native olarak kurulur; pip subprocess
  # oluşturulmaz, geçici condaenv.*.requirements.txt dosyası üretilmez.
  # Paket yönetimi uv ile lock/tabanlı sync üzerinden yapılır.
  # GPU torch desteği için:
  #   uv pip install torch>=2.4.1 torchvision --extra-index-url https://download.pytorch.org/whl/cu130
  # Geliştirme + tüm extras için:
  #   uv sync --all-extras
  - uv>=0.5.0

# ── Kurulum talimatları (WSL2 / Ubuntu / Conda) ───────────────────────────────
#
# 1. Ortamı oluştur:
#      conda env create -f environment.yml
#      conda activate sidar
#
# 2. Tüm bağımlılıkları kur (CPU, CI/CD ile uyumlu):
#      uv sync --all-extras
#
# 3. GPU (RTX 3070, CUDA 13.x) torch kurulumu için:
#      uv pip install torch>=2.4.1 torchvision --extra-index-url https://download.pytorch.org/whl/cu130
#
# 4. CUDA bağlantısını doğrula:
#      python -c "import torch; print(torch.cuda.is_available(), torch.version.cuda)"
#
# NOT — WSL2 ses desteği:
#   PulseAudio veya PipeWire kurulumu gerekebilir; pyaudio WSL2'de
#   çoğunlukla ses donanımına erişemez. Ses özelliği devre dışı bırakılabilir:
#   ENABLE_MULTIMODAL=false (.env)
