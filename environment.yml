name: sidar-ai
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip=24.2
  - git=2.45
  - setuptools=75.1
  - wheel=0.44
  # ─── PyTorch ───────────────────────────────────────────────────────────────
  # WSL2 / Ubuntu / Conda ortamı için NOT:
  #   Conda'nın pytorch-cuda paketi, WSL2'nin Windows sürücüsünden gelen
  #   libcuda.so.1 stub'ı ile ÇAKIŞIR → GPU görünmez hale gelir.
  #   Bu yüzden PyTorch'u CONDA yerine PIP (CUDA wheel) üzerinden kuruyoruz.
  #
  #   RTX 3070 Ti Laptop (Compute 8.6 / Ampere) — CUDA 12.4 (cu124) tam desteklidir.
  #   Pip bölümünde torch wheel ile kurulumu yapılmaktadır (aşağıya bakın).
  #
  #   GPU için ekstra wheel index dış ortam değişkeni ile verilir;
  #   varsayılan dosya davranışı CPU uyumludur.
  - pip:
      # ── PyTorch index stratejisi (CPU varsayılan, GPU opsiyonel) ─────────────
      # Varsayılan kurulum CPU uyumludur (yalnızca PyPI).
      # GPU için kurulum öncesi dışarıdan ekleyin:
      #   PIP_EXTRA_INDEX_URL=https://download.pytorch.org/whl/cu124
      # Böylece aynı environment.yml CPU/GPU ortamlarda profile göre çalışır.

      # ── Temel ─────────────────────────────────────────────────────────────
      - packaging~=24.1
      - python-dotenv~=1.0.1
      - pyyaml~=6.0.2
      # requests kaldırıldı — tüm HTTP istekleri httpx ile yapılmaktadır

      # ── Asenkron HTTP & Veri Doğrulama ────────────────────────────────────
      - httpx~=0.27.0
      - pydantic~=2.8.2
      - cachetools~=5.5.0
      - redis~=5.2.1

      # ── Veritabanı & Migrasyon ────────────────────────────────────────────
      - asyncpg~=0.30.0
      - SQLAlchemy~=2.0.36
      - alembic~=1.14.0

      # ── PyTorch (CPU varsayılan; GPU için PIP_EXTRA_INDEX_URL ile cu124) ───────
      - torch~=2.4.1
      - torchvision~=0.19.1

      # ── Sistem İzleme ─────────────────────────────────────────────────────
      - psutil~=6.0.0
      # GPU sıcaklık, kullanım yüzdesi ve sürücü sürümü için (opsiyonel).
      # WSL2'de NVML erişimi kısıtlı olabilir (Windows sürücüsü bağımlı);
      # kod gracefully devre dışı kalır (hata vermez).
      - nvidia-ml-py~=12.560.30

      # ── Docker (Güvenli Kod Çalıştırma / REPL Sandbox) ────────────────────
      - docker~=7.1.0

      # ── AI Sağlayıcıları ──────────────────────────────────────────────────
      - google-generativeai~=0.8.3
      - openai~=1.51.2
      - anthropic~=0.40.0

      # ── GitHub Entegrasyonu ───────────────────────────────────────────────
      - PyGithub~=2.4.0

      # ── Web Arama ─────────────────────────────────────────────────────────
      - duckduckgo-search~=6.2.13
      - beautifulsoup4~=4.12.3

      # ── RAG (Vektör & BM25) ───────────────────────────────────────────────
      - rank-bm25==0.2.2
      - chromadb~=0.5.5
      # sentence-transformers: USE_GPU=true ise CUDA üzerinde embedding yapar
      - sentence-transformers~=3.0.1
      - tiktoken~=0.8.0

      # ── Güvenlik & Şifreleme ──────────────────────────────────────────────
      # MEMORY_ENCRYPTION_KEY ayarlandığında oturum dosyaları Fernet ile şifrelenir
      - cryptography~=43.0.1

      # ── Web Arayüzü ───────────────────────────────────────────────────────
      - fastapi~=0.115.0
      - python-multipart~=0.0.9
      - uvicorn[standard]~=0.30.6
      - prometheus-client~=0.21.0  # /metrics endpoint'inde Prometheus format çıktısı için opsiyonel
      - opentelemetry-api~=1.29.0
      - opentelemetry-sdk~=1.29.0
      - opentelemetry-instrumentation-fastapi~=0.50b0
      - opentelemetry-exporter-otlp~=1.29.0

      # ── Geliştirme & Test ─────────────────────────────────────────────────
      - pytest>=8.0.0
      - pytest-asyncio>=0.23.0
      - pytest-cov~=5.0.0
      - pytest-benchmark~=4.0.0
      - black~=24.8.0
      - flake8~=7.1.1
      - ruff~=0.8.1
      - mypy~=1.11.2