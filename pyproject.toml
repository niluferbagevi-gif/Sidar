[project]
name = "sidar-project"
version = "0.0.0"
requires-python = ">=3.11"
dependencies = [
  "packaging~=24.1",
  "python-dotenv~=1.0.1",
  "pyyaml~=6.0.2",
  "httpx~=0.27.0",
  "pydantic~=2.8.2",
  "cachetools~=5.5.0",
  "redis~=5.2.1",
  "psutil~=6.0.0",
  "nvidia-ml-py~=12.560.30",
  "docker~=7.1.0",
  "google-generativeai~=0.8.3",
  "openai~=1.51.2",
  "anthropic~=0.40.0",
  "PyGithub~=2.4.0",
  "duckduckgo-search~=6.2.13",
  "beautifulsoup4~=4.12.3",
  "rank-bm25==0.2.2",
  "tiktoken~=0.8.0",
  "cryptography~=43.0.1",
  "fastapi~=0.115.0",
  "python-multipart~=0.0.9",
  "uvicorn[standard]~=0.30.6",
  "eel>=0.16.0",
  "prometheus-client~=0.21.0",
  "anyio>=4.0.0",
  "aiosqlite~=0.20.0",
  "SQLAlchemy~=2.0.36",
  "alembic~=1.14.0",
]

[project.optional-dependencies]
postgres = [
  "asyncpg~=0.30.0",
]
telemetry = [
  "opentelemetry-api~=1.29.0",
  "opentelemetry-sdk~=1.29.0",
  "opentelemetry-instrumentation-fastapi~=0.50b0",
  "opentelemetry-exporter-otlp~=1.29.0",
]
rag = [
  "chromadb~=0.5.5",
  "torch~=2.4.1",
  "torchvision~=0.19.1",
  "sentence-transformers~=3.0.1",
]

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
  ".git",
  ".venv",
  "__pycache__",
  "data",
  "logs",
  "temp",
]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "W",
  "I",
  "B",
  "UP",
  "ASYNC",
]
ignore = [
  "E501",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_configs = true
warn_return_any = true
show_error_codes = true
pretty = true
exclude = [
  "^tests/",
  "^data/",
  "^logs/",
  "^temp/",
]

[[tool.mypy.overrides]]
module = [
  "google.generativeai",
  "google.generativeai.*",
  "chromadb",
  "chromadb.*",
  "sentence_transformers",
  "sentence_transformers.*",
  "duckduckgo_search",
  "duckduckgo_search.*",
  "github",
  "github.*",
  "opentelemetry",
  "opentelemetry.*",
  "redis",
  "redis.*",
  "prometheus_client",
  "prometheus_client.*",
]
ignore_missing_imports = true