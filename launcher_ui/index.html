<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sidar Launcher</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-glow"></div>
    <main class="card">
      <h1>Sidar Launcher</h1>
      <p class="subtitle">PyWebView + ayrı frontend yapısı (fallback sürüm)</p>

      <div class="steps" id="steps"></div>

      <section class="panel" id="step-panel"></section>

      <div class="actions">
        <button id="backBtn" class="btn ghost">Geri</button>
        <button id="nextBtn" class="btn">İleri</button>
      </div>

      <pre id="result"></pre>
    </main>

    <script src="./wizard.js"></script>
  </body>
</html>
