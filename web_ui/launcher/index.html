<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sidar Launcher</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, Segoe UI, Arial, sans-serif; color: #e8ecff; background: #040712; overflow: hidden; }
    #bg { position: fixed; inset: 0; z-index: 0; }
    .noise { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: .07;
      background-image: radial-gradient(circle at 1px 1px, #fff 1px, transparent 1px); background-size: 3px 3px; }
    .wrap { position: relative; z-index: 2; min-height: 100vh; display: grid; place-items: center; padding: 20px; }
    .card { width: min(900px, 95vw); backdrop-filter: blur(12px); border: 1px solid rgba(125,149,255,.28);
      border-radius: 18px; background: linear-gradient(180deg, rgba(15,22,45,.76), rgba(10,14,28,.78)); box-shadow: 0 25px 60px rgba(0,0,0,.45); padding: 24px; }
    h1 { margin: 0 0 6px; font-size: 28px; }
    p { margin: 0 0 16px; color: #a8b6e8; }
    .grid { display:grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap:12px; }
    label { display:block; font-size:12px; color:#9fb0e3; margin-bottom:5px; }
    input, select { width:100%; border-radius:10px; border:1px solid #314173; background:#0d1430; color:#eff3ff; padding:10px; }
    .row { margin-top:14px; display:flex; gap:8px; flex-wrap:wrap; }
    button { border:0; border-radius:10px; padding:10px 14px; font-weight:700; cursor:pointer; }
    .primary { background:linear-gradient(90deg,#3d78ff,#00b8ff); color:white; }
    .muted { background:#25355f; color:#eef; }
    .note { margin-top: 12px; font-size: 12px; color:#95a6db; }
    @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="noise"></div>
  <div class="wrap">
    <div class="card" id="panel">
      <h1>Sidar Launcher</h1>
      <p>PyWebView + ayrı frontend yapısı (Vite/React ile değiştirilebilir).</p>
      <div class="grid">
        <div><label>Sağlayıcı</label><select id="provider"><option>ollama</option><option>gemini</option></select></div>
        <div><label>Erişim</label><select id="level"><option>restricted</option><option>sandbox</option><option selected>full</option></select></div>
        <div><label>Mod</label><select id="mode"><option selected>cli</option><option>web</option></select></div>
        <div><label>Log</label><select id="log"><option>DEBUG</option><option selected>INFO</option><option>WARNING</option></select></div>
        <div><label>Ollama Model</label><input id="model" value="qwen2.5-coder:14b" /></div>
        <div><label>Web Host</label><input id="host" value="127.0.0.1" /></div>
        <div><label>Web Port</label><input id="port" value="8080" /></div>
      </div>
      <div class="row">
        <button class="muted" id="checkBtn">Ön Kontrol</button>
        <button class="primary" id="runBtn">Başlat</button>
      </div>
      <div class="note">İpucu: Bu dosya yerel fallback'tir. Vite/React frontend için --launcher-url veya SIDAR_LAUNCHER_URL kullan.</div>
    </div>
  </div>
  <script>
    const $ = (id) => document.getElementById(id);

    gsap.from("#panel", { y: 20, opacity: 0, duration: 0.8, ease: "power2.out" });

    // Subtle Three.js animated background
    const canvas = document.getElementById("bg");
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 1000);
    camera.position.z = 8;

    const geometry = new THREE.TorusKnotGeometry(2.3, 0.65, 128, 24);
    const material = new THREE.MeshStandardMaterial({ color: 0x4b7cff, metalness: 0.7, roughness: 0.25 });
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);
    const light1 = new THREE.PointLight(0x78a6ff, 2.4); light1.position.set(4, 4, 8); scene.add(light1);
    const light2 = new THREE.PointLight(0x00e5ff, 1.6); light2.position.set(-5, -3, 6); scene.add(light2);

    function resize() {
      const w = window.innerWidth, h = window.innerHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    resize();
    window.addEventListener("resize", resize);

    function animate(t) {
      mesh.rotation.x = t * 0.0002;
      mesh.rotation.y = t * 0.00028;
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);

    async function loadDefaults() {
      if (!window.pywebview?.api?.get_defaults) return;
      const d = await window.pywebview.api.get_defaults();
      $("provider").value = d.provider;
      $("level").value = d.access_level;
      $("mode").value = d.mode;
      $("log").value = d.log;
      $("model").value = d.model;
      $("host").value = d.host;
      $("port").value = d.port;
    }

    async function runChecks() {
      if (!window.pywebview?.api?.preflight) return alert("PyWebView API bağlantısı yok.");
      const txt = await window.pywebview.api.preflight($("provider").value);
      alert(txt);
    }

    async function launch() {
      if (!window.pywebview?.api?.launch) return alert("PyWebView API bağlantısı yok.");
      await window.pywebview.api.launch(
        $("provider").value,
        $("level").value,
        $("mode").value,
        $("log").value,
        $("model").value,
        $("host").value,
        $("port").value,
      );
    }

    $("checkBtn").addEventListener("click", runChecks);
    $("runBtn").addEventListener("click", launch);

    if (window.pywebview) {
      window.pywebview.ready.then(loadDefaults);
    } else {
      loadDefaults();
    }
  </script>
</body>
</html>
